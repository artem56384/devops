- name: Create node_exporter user
  user:
    name: node_exporter
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

- name: Create install directory
  file:
    path: /opt/node_exporter
    state: directory
    mode: "0755"

- name: Download Node Exporter archive
  get_url:
    url: https://github.com/prometheus/node_exporter/releases/download/v1.8.0/node_exporter-1.8.0.linux-amd64.tar.gz
    dest: /tmp/node_exporter-1.8.0.linux-amd64.tar.gz
    mode: "0644"

- name: Extract Node Exporter archive
  unarchive:
    src: /tmp/node_exporter-1.8.0.linux-amd64.tar.gz
    dest: /opt/node_exporter
    remote_src: yes
    creates: /opt/node_exporter/node_exporter-1.8.0.linux-amd64/node_exporter

- name: Create symbolic link
  file:
    src: /opt/node_exporter/node_exporter-1.8.0.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    state: link
    force: yes

- name: Set ownership on install directory
  file:
    path: /opt/node_exporter
    owner: node_exporter
    group: node_exporter
    recurse: yes

- name: Create systemd unit
  copy:
    dest: /etc/systemd/system/node_exporter.service
    mode: "0644"
    content: |
      [Unit]
      Description=Node Exporter
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=node_exporter
      Group=node_exporter
      Type=simple
      ExecStart=/usr/local/bin/node_exporter

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and start Node Exporter
  systemd:
    name: node_exporter
    enabled: yes
    state: started

- name: Check metrics endpoint
  command: curl -fsS http://localhost:9100/metrics
  register: node_exporter_metrics
  changed_when: false

- name: Show metrics result
  debug:
    msg: "Node Exporter is up and metrics are available"
